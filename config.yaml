dataset:
  name: semistaticsim
  root: /tmp/sss
  split_dir: test
  scenes_train:
  - 1
  scenes_val:
  - 1
  stereo_config: horizontal_10cm
  seed: 0
  run_id: 0
  depth_source: gt
  max_depth: 200.0
experiment:
  name: semistaticsim_horizontal_10cm
  hypothesis: ''
augmentation:
  rotation: false
  rotation_range:
  - 0
  - 360
  random_crop: true
  crop_size:
  - 480
  - 640
  noise: false
  noise_var: 0.0064
matching:
  algorithm: orb
  max_keypoints: 2000
  max_hamming: 64
  max_epipolar_error: 3.0
  sampson_threshold: 4.0
loss:
  name: bearing_nll
model:
  architecture: UNetXS
  parameterization: sab
  isotropic: false
  checkpoint: null
training:
  train_batch_size: 8
  eval_batch_size: 8
  lr: 0.0001
  lr_gamma: 0.99995
  epochs: 50
  grad_clip: 1.0
  checkpoint_interval: 5
  validation_interval: 1
  vis_interval: 5
  device: cuda
  num_workers: 4
  seed: 42
logging:
  log_dir: checkpoints
  wandb_project: stereo_covariance
  wandb_tags: []
  wandb_offline: false
