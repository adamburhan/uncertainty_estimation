# Base config for stereo covariance training.
# Override any field from the command line:
#   python scripts/train_stereo_cov.py dataset=tartanair experiment.name=001
#   python scripts/train_stereo_cov.py dataset=sss experiment.name=002

defaults:
  - dataset: sss
  - _self_

# Hydra output dir — one folder per named experiment.
hydra:
  run:
    dir: outputs/${experiment.name}

experiment:
  name: null         # auto-derived from axis values if left as ??? (see train_stereo_cov.py)
  group: null        # auto-derived; aggregates seeds of the same (stereo, loss, corr) cell
  label: unlabeled  # which experiment this run belongs to: A_stereo | B_falsif | C_loss | D_3dctrl
  hypothesis: ""    # free-text note logged with config

augmentation:
  rotation: false           # reserved; not yet implemented
  rotation_range: [0, 360]
  random_crop: false
  crop_size: [640, 640]
  noise: false
  noise_var: 0.0064

matching:
  algorithm: orb
  max_keypoints: 2000
  max_hamming: 64
  lowe_ratio: 0.75
  ransac_reproj_threshold: 3.0

correspondence:
  mode: real    # "real" | "synthetic" (2D-iso pixel noise) | "synthetic_3d" (3D-iso noise)
  sigma: 2.0    # synthetic: pixels.  synthetic_3d: metres.

loss:
  name: bearing_nll         # "bearing_nll" | "pixel_nll"

model:
  architecture: UNetXS      # "UNetXS" | "UNetSmall" | "UNetM" | "UNet"
  parameterization: sab     # "sab" | "entries" | "inv_entries"
  isotropic: false
  checkpoint: null          # path to resume from, or null

training:
  train_batch_size: 16
  eval_batch_size: 32
  lr: 1e-4
  lr_gamma: 1.0              # constant LR — no decay
  epochs: 50
  grad_clip: 1.0
  checkpoint_interval: 25
  validation_interval: 1
  vis_interval: 5
  device: cuda
  num_workers: 4
  seed: 42

logging:
  log_dir: checkpoints
  wandb_project: stereo_covariance
  wandb_tags: []
  wandb_offline: false
