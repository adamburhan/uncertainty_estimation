experiment:
  name: debug
  hypothesis: ''
dataset:
  name: tartanair
  root: /Volumes/T9/datasets/tartanair-v2
  environments:
  - ArchVizTinyHouseDay
  sequences_train:
  - P000
  sequences_val:
  - P000
  left_images: image_lcam_front
  right_images: image_rcam_front
  depth_source: gt
  max_depth: 200.0
augmentation:
  rotation: false
  rotation_range:
  - 0
  - 360
  random_crop: true
  crop_size:
  - 480
  - 640
  noise: false
  noise_var: 0.0064
matching:
  algorithm: orb
  max_keypoints: 500
  max_hamming: 64
  max_epipolar_error: 2.0
  sampson_threshold: 4.0
loss:
  name: bearing_nll
model:
  architecture: UNetXS
  parameterization: sab
  isotropic: false
  checkpoint: checkpoints/best.pth
training:
  batch_size: 8
  lr: 0.0001
  lr_gamma: 0.99995
  epochs: 50
  grad_clip: 1.0
  checkpoint_interval: 5
  validation_interval: 1
  vis_interval: 5
  device: mps
  num_workers: 4
  seed: 42
logging:
  wandb_project: stereo_covariance
  wandb_tags: []
  wandb_offline: false
